name: Update Calendar Data

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual runs

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Download Calendar from Zoho
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location \
            --retry 3 --retry-delay 5 \
            "https://calendar.zoho.eu/ical/zz080112301ab3047e81313179c3ee5fd4b00c2a7157b801985735a7b689432472bf947fc87d113e58fdc5e83eea16ec9dc7bc3e4c" \
            --output events.ics

      - name: Commit and Push changes
        run: |
          set -euo pipefail
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # Commit only if the target file changed
          if ! git diff --quiet -- events.ics; then
            git add events.ics
            git commit -m "chore: auto-update calendar"
            git push
          else
            echo "No calendar changes detected."
          fi
