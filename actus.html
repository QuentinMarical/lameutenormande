	<!-- Script pour charger dynamiquement les posts Telegram depuis le calendrier -->
	<script>
	(function() {
		'use strict';
		
		// ╔════════════════════════════════════════════════════════════╗
		// ║  100% AUTOMATIQUE - v2.0 (GitHub Pages optimisé)           ║
		// ║                                                            ║
		// ║  Dans Zoho Calendar, ajoute dans "Participants" :          ║
		// ║  post@9.telegram                                           ║
		// ║                                                            ║
		// ║  Le script :                                               ║
		// ║  1. Lit le calendrier (avec cache-busting)                 ║
		// ║  2. Trouve tous les post@#.telegram                        ║
		// ║  3. Génère automatiquement les widgets Telegram            ║
		// ║  4. Ajoute les boutons popup pour chaque événement         ║
		// ╚════════════════════════════════════════════════════════════╝
		
		const CONFIG = {
			ICAL_CDN: 'https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js',
			CACHE_DURATION: 5 * 60 * 1000, // 5 minutes
			PAST_EVENTS_DAYS: 30,
			FUTURE_EVENTS_DAYS: 90, // Afficher jusqu'à 90 jours dans le futur
			IFRAME_MIN_HEIGHT: 80,
			IFRAME_DEFAULT_HEIGHT: 150, // Hauteur réduite pour ne montrer que le texte
			IFRAME_MAX_HEIGHT: 250, // Limite max pour éviter les images trop grandes
			RETRY_ATTEMPTS: 2,
			RETRY_DELAY: 1000
		};
		
		let calendarEvents = [];
		let postsFromCalendar = [];
		let currentKeyHandler = null; // Pour éviter les memory leaks
		let iframeRegistry = new Map(); // Pour gérer les postMessage proprement
		
		// Gestionnaire centralisé des messages Telegram (évite les listeners multiples)
		function initTelegramResizeHandler() {
			if (window._telegramResizeInitialized) return;
			window._telegramResizeInitialized = true;
			
			window.addEventListener('message', function(e) {
				if (e.origin !== 'https://t.me') return;
				if (!e.data || e.data.event !== 'resize') return;
				
				// Trouver l'iframe correspondante
				for (const [iframeId, iframe] of iframeRegistry) {
					try {
						if (iframe.contentWindow === e.source && e.data.height) {
							// Limiter entre min et max pour ne montrer que le texte
							const clampedHeight = Math.min(
								Math.max(e.data.height, CONFIG.IFRAME_MIN_HEIGHT),
								CONFIG.IFRAME_MAX_HEIGHT
							);
							iframe.style.height = clampedHeight + 'px';
							break;
						}
					} catch (err) { /* Cross-origin, ignorer */ }
				}
			});
		}
		
		// Afficher un état de chargement
		function afficherChargement(feed, message = 'Chargement des actualités...') {
			feed.innerHTML = `
				<div class="telegram-loading" style="text-align: center; padding: 2rem; color: rgba(255,255,255,0.7);">
					<div class="loading-spinner" style="display: inline-block; width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #E91E63; border-radius: 50%; animation: spin 1s linear infinite;"></div>
					<p style="margin-top: 1rem;">${escapeHtml(message)}</p>
				</div>
				<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
			`;
		}
		
		// Afficher une erreur
		function afficherErreur(feed, message) {
			const errorDiv = document.createElement('div');
			errorDiv.className = 'telegram-error';
			errorDiv.style.cssText = 'text-align: center; padding: 1rem; color: #ff6b6b; background: rgba(255,107,107,0.1); border-radius: 8px; margin: 1rem 0;';
			errorDiv.innerHTML = '⚠️ ' + escapeHtml(message);
			feed.insertBefore(errorDiv, feed.firstChild);
		}
		
		// Charger ICAL.js avec gestion d'erreur améliorée
		async function chargerICAL() {
			if (typeof ICAL !== 'undefined') return true;
			
			try {
				await new Promise((resolve, reject) => {
					const s = document.createElement('script');
					s.src = CONFIG.ICAL_CDN;
					s.crossOrigin = 'anonymous';
					s.onload = () => {
						if (typeof ICAL !== 'undefined') resolve();
						else reject(new Error('ICAL non défini après chargement'));
					};
					s.onerror = () => reject(new Error('Échec chargement ICAL.js'));
					document.head.appendChild(s);
				});
				return true;
			} catch (e) {
				console.warn('⚠️ ICAL.js:', e.message);
				return false;
			}
		}
		
		// Charger le calendrier et extraire les posts
		async function chargerCalendrier() {
			if (!await chargerICAL()) return [];
			
			// URLs à essayer (GitHub Pages compatible + cache-busting)
			const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '');
			const cacheBuster = '?v=' + Date.now();
			const urls = [
				'events.ics' + cacheBuster,
				'/events.ics' + cacheBuster,
				baseUrl + '/events.ics' + cacheBuster,
				'assets/events.ics' + cacheBuster
			];
			
			for (const url of urls) {
				try {
					const r = await fetch(url, { 
						cache: 'no-store',
						headers: { 'Cache-Control': 'no-cache' }
					});
					if (!r.ok) continue;
					const data = await r.text();
					if (!data.includes('BEGIN:VCALENDAR')) continue;
					
					const comp = new ICAL.Component(ICAL.parse(data));
					calendarEvents = comp.getAllSubcomponents('vevent').map(v => {
						const e = new ICAL.Event(v);
						
						// Chercher post@#.telegram dans les participants (attendee)
						let postNum = '';
						const attendees = v.getAllProperties('attendee');
						for (const att of attendees) {
							// Récupérer la valeur brute (mailto:post@9.telegram ou CN param)
							const val = att.getFirstValue() || '';
							const cn = att.getParameter('cn') || '';
							const combined = val + ' ' + cn;
							const match = combined.match(/post@(\d+)\.telegram/i);
							if (match) {
								postNum = match[1];
								break;
							}
						}
						
						return {
							title: e.summary || '',
							description: e.description || '',
							location: e.location || '',
							startDate: e.startDate ? e.startDate.toJSDate() : null,
							endDate: e.endDate ? e.endDate.toJSDate() : null,
							url: v.getFirstPropertyValue('url') || '',
							postNum: postNum
						};
					});
					
					// Filtrer les événements dans la fenêtre temporelle
					const now = new Date();
					const pastCutoff = new Date(now.getTime() - CONFIG.PAST_EVENTS_DAYS * 24 * 60 * 60 * 1000);
					const futureCutoff = new Date(now.getTime() + CONFIG.FUTURE_EVENTS_DAYS * 24 * 60 * 60 * 1000);
					
					// Extraire les posts liés, prioriser les événements à venir
					postsFromCalendar = calendarEvents
						.filter(e => e.postNum && e.startDate && e.startDate >= pastCutoff && e.startDate <= futureCutoff)
						.sort((a, b) => {
							// Prioriser: en cours > à venir > passés
							const statusA = getEventStatus(a);
							const statusB = getEventStatus(b);
							const priority = { 'ongoing': 0, 'upcoming': 1, 'past': 2, 'unknown': 3 };
							if (priority[statusA] !== priority[statusB]) {
								return priority[statusA] - priority[statusB];
							}
							// Dans la même catégorie: à venir = date croissante, passés = date décroissante
							if (statusA === 'upcoming' || statusA === 'ongoing') {
								return a.startDate - b.startDate;
							}
							return b.startDate - a.startDate;
						});
					
					console.log('📅 Calendrier chargé depuis:', url.split('?')[0]);
					console.log('   →', calendarEvents.length, 'événements,', postsFromCalendar.length, 'avec posts Telegram');
					if (postsFromCalendar.length) {
						postsFromCalendar.forEach(e => console.log('   ✅ post@' + e.postNum + '.telegram →', e.title));
					}
					return postsFromCalendar;
				} catch (e) { 
					console.warn('⚠️ Erreur URL', url.split('?')[0] + ':', e.message);
				}
			}
			console.warn('⚠️ Aucun fichier events.ics trouvé - mode fallback activé');
			return [];
		}
		
		// Générer les posts Telegram (hybride: calendrier + fallback combinés)
		function genererPostsTelegram() {
			const feed = document.getElementById('telegram-feed');
			if (!feed) return;
			
			const channel = feed.dataset.channel || 'Annonces_Meute_Normande';
			const maxPosts = parseInt(feed.dataset.count) || 5;
			const latestPost = parseInt(feed.dataset.latest) || 10;
			
			// Collecter les numéros de posts déjà utilisés (du calendrier)
			const usedPostNums = new Set();
			let postsAdded = 0;
			
			// 1. D'abord afficher les posts liés au calendrier
			if (postsFromCalendar.length > 0) {
				const calendarPosts = postsFromCalendar.slice(0, maxPosts);
				console.log('📨 Posts calendrier:', calendarPosts.length);
				
				calendarPosts.forEach(event => {
					creerArticleTelegram(feed, channel, event.postNum, event);
					usedPostNums.add(parseInt(event.postNum));
					postsAdded++;
				});
			}
			
			// 2. Compléter avec les derniers posts du canal (fallback)
			if (postsAdded < maxPosts) {
				const remaining = maxPosts - postsAdded;
				console.log('📨 Ajout fallback:', remaining, 'posts supplémentaires');
				
				let fallbackAdded = 0;
				let currentPost = latestPost;
				
				while (fallbackAdded < remaining && currentPost > 0) {
					// Éviter les doublons avec les posts du calendrier
					if (!usedPostNums.has(currentPost)) {
						creerArticleTelegram(feed, channel, currentPost, null);
						fallbackAdded++;
					}
					currentPost--;
				}
			}
			
			console.log('📨 Total posts affichés:', postsAdded + (maxPosts - postsAdded));
		}
		
		// Déterminer si un événement est passé, en cours ou à venir
		function getEventStatus(event) {
			if (!event || !event.startDate) return 'unknown';
			const now = new Date();
			const start = new Date(event.startDate);
			const end = event.endDate ? new Date(event.endDate) : start;
			
			if (now < start) return 'upcoming';
			if (now >= start && now <= end) return 'ongoing';
			return 'past';
		}
		
		// Créer un article Telegram
		function creerArticleTelegram(feed, channel, postNum, event) {
			const article = document.createElement('article');
			article.className = 'telegram-article';
			if (event) {
				article.classList.add('has-event');
				const status = getEventStatus(event);
				article.classList.add('event-' + status);
				article.dataset.eventStatus = status;
			}
			article.dataset.postNum = postNum;
			
			// Wrapper du post
			const wrapper = document.createElement('div');
			wrapper.className = 'telegram-post-wrapper';
			
			// Contenu du post - utiliser iframe directement pour fiabilité
			const content = document.createElement('div');
			content.className = 'telegram-post-content';
			
			const iframeId = 'telegram-post-' + channel.replace(/[^a-zA-Z0-9]/g, '') + '-' + postNum;
			const iframe = document.createElement('iframe');
			iframe.id = iframeId;
			iframe.src = 'https://t.me/' + channel + '/' + postNum + '?embed=1&color=E91E63&dark=1&dark_color=E91E63';
			iframe.width = '100%';
			iframe.height = CONFIG.IFRAME_DEFAULT_HEIGHT;
			iframe.frameBorder = '0';
			iframe.scrolling = 'no';
			iframe.loading = 'lazy';
			iframe.style.border = 'none';
			iframe.style.overflow = 'hidden';
			iframe.style.minHeight = CONFIG.IFRAME_MIN_HEIGHT + 'px';
			iframe.style.background = 'rgba(255,255,255,0.02)';
			iframe.allowTransparency = true;
			iframe.setAttribute('title', 'Post Telegram' + (event ? ': ' + event.title : ' #' + postNum));
			content.appendChild(iframe);
			
			// Enregistrer l'iframe pour le gestionnaire centralisé
			iframeRegistry.set(iframeId, iframe);
			
			// Fallback si pas de message de resize après 2s
			iframe.onload = function() {
				setTimeout(() => {
					const currentHeight = parseInt(iframe.style.height) || 0;
					if (currentHeight < CONFIG.IFRAME_MIN_HEIGHT) {
						iframe.style.height = CONFIG.IFRAME_DEFAULT_HEIGHT + 'px';
					}
					// Limiter la hauteur max pour masquer les images
					if (currentHeight > CONFIG.IFRAME_MAX_HEIGHT) {
						iframe.style.height = CONFIG.IFRAME_MAX_HEIGHT + 'px';
					}
				}, 2000);
			};
			
			// Gestion erreur iframe
			iframe.onerror = function() {
				iframeRegistry.delete(iframeId);
				content.innerHTML = '<div style="padding: 2rem; text-align: center; color: rgba(255,255,255,0.5);">⚠️ Post non disponible</div>';
			};
			
			wrapper.appendChild(content);
			article.appendChild(wrapper);
			
			// Bouton événement (seulement si lié à un événement)
			if (event) {
				const btn = document.createElement('button');
				btn.className = 'event-arrow-btn';
				btn.title = 'Voir: ' + event.title;
				btn.setAttribute('aria-label', 'Voir les détails de: ' + event.title);
				btn.innerHTML = '<span class="arrow-icon" aria-hidden="true">▶</span>';
				btn.addEventListener('click', function(e) {
					e.preventDefault();
					e.stopPropagation();
					lastFocusedElement = btn; // Sauvegarder pour restaurer après fermeture
					ouvrirPopup(event);
				});
				article.appendChild(btn);
				console.log('✅ Post /' + postNum + ' → ' + event.title);
			} else {
				console.log('✅ Post /' + postNum);
			}
			
			feed.appendChild(article);
		}
		
		// Variable pour restaurer le focus après fermeture
		let lastFocusedElement = null;
		
		// Fermer la popup
		function fermerPopup() {
			const modal = document.querySelector('.event-modal');
			if (modal && modal.classList.contains('show')) {
				modal.classList.add('closing');
				document.body.classList.remove('modal-open');
				setTimeout(() => modal.classList.remove('show', 'closing'), 300);
				
				// Nettoyer le handler clavier
				if (currentKeyHandler) {
					document.removeEventListener('keydown', currentKeyHandler);
					currentKeyHandler = null;
				}
				
				// Restaurer le focus
				if (lastFocusedElement) {
					lastFocusedElement.focus();
					lastFocusedElement = null;
				}
			}
		}
		
		// Échapper le HTML pour éviter XSS
		function escapeHtml(text) {
			if (!text) return '';
			const div = document.createElement('div');
			div.textContent = text;
			return div.innerHTML;
		}
		
		// Convertir les URLs en liens cliquables (après échappement)
		function linkifyText(text) {
			if (!text) return '';
			const escaped = escapeHtml(text);
			return escaped
				.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>')
				.replace(/\n/g, '<br>');
		}
		
		// Ouvrir la popup
		function ouvrirPopup(event) {
			const modal = document.querySelector('.event-modal');
			const titre = document.querySelector('.event-modal-title');
			const corps = document.querySelector('.event-modal-body');
			if (!modal || !titre || !corps) {
				console.error('❌ Modal non trouvée dans le DOM');
				return;
			}
			
			// Titre sécurisé
			titre.textContent = event.title || 'Événement';
			
			const dateOpts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
			const timeOpts = { hour: '2-digit', minute: '2-digit' };
			
			let dateStr = 'Date non définie';
			let timeStr = '';
			
			if (event.startDate) {
				try {
					const start = new Date(event.startDate);
					if (!isNaN(start.getTime())) {
						const end = event.endDate ? new Date(event.endDate) : null;
						
						dateStr = start.toLocaleDateString('fr-FR', dateOpts);
						timeStr = start.toLocaleTimeString('fr-FR', timeOpts);
						
						if (end && !isNaN(end.getTime())) {
							if (start.toDateString() === end.toDateString()) {
								timeStr += ' - ' + end.toLocaleTimeString('fr-FR', timeOpts);
							} else {
								dateStr += ' au ' + end.toLocaleDateString('fr-FR', dateOpts);
							}
						}
					}
				} catch (e) {
					console.warn('⚠️ Erreur parsing date:', e);
				}
			}
			
			let html = '<div class="event-modal-body-grid"><div class="event-modal-left">';
			html += '<div class="event-info-row"><span class="event-info-icon">📅</span><div class="event-info-content"><div class="event-info-label">Date</div><div class="event-info-text">' + escapeHtml(dateStr) + '</div></div></div>';
			
			if (timeStr) {
				html += '<div class="event-info-row"><span class="event-info-icon">⏰</span><div class="event-info-content"><div class="event-info-label">Horaire</div><div class="event-info-text">' + escapeHtml(timeStr) + '</div></div></div>';
			}
			
			if (event.location) {
				const loc = encodeURIComponent(event.location);
				const locSafe = escapeHtml(event.location);
				html += '<div class="event-info-row"><span class="event-info-icon">📍</span><div class="event-info-content"><div class="event-info-label">Lieu</div><div class="event-info-text">' + locSafe + '</div><div class="event-location-buttons"><a href="https://www.google.com/maps/search/?api=1&query=' + loc + '" target="_blank" rel="noopener noreferrer" class="location-btn location-google">🗺️ Google</a><a href="https://waze.com/ul?q=' + loc + '" target="_blank" rel="noopener noreferrer" class="location-btn location-waze">🚗 Waze</a><a href="https://maps.apple.com/?q=' + loc + '" target="_blank" rel="noopener noreferrer" class="location-btn location-apple">🍎 Apple</a></div></div></div>';
			}
			
			html += '</div><div class="event-modal-right">';
			if (event.description) {
				const desc = linkifyText(event.description);
				html += '<div class="event-info-row"><span class="event-info-icon">📝</span><div class="event-info-content"><div class="event-info-label">Description</div><div class="event-info-text">' + desc + '</div></div></div>';
			}
			if (event.url) {
				// Valider l'URL avant de l'insérer
				try {
					const urlObj = new URL(event.url);
					if (urlObj.protocol === 'http:' || urlObj.protocol === 'https:') {
						html += '<div class="event-info-row"><span class="event-info-icon">🔗</span><div class="event-info-content"><div class="event-info-label">Plus d\'infos</div><a href="' + escapeHtml(event.url) + '" target="_blank" rel="noopener noreferrer" class="event-url-button">Voir le site</a></div></div>';
					}
				} catch (e) {
					// URL invalide, on l'ignore
				}
			}
			html += '</div></div>';
			
			corps.innerHTML = html;
			document.body.classList.add('modal-open');
			modal.classList.add('show');
			
			// Attributs ARIA pour accessibilité
			modal.setAttribute('role', 'dialog');
			modal.setAttribute('aria-modal', 'true');
			modal.setAttribute('aria-labelledby', 'event-modal-title');
			
			// Event listeners propres (pas de pollution globale)
			const closeBtn = modal.querySelector('.event-modal-close');
			const overlay = modal.querySelector('.event-modal-overlay');
			
			if (closeBtn) {
				closeBtn.onclick = fermerPopup;
				closeBtn.setAttribute('aria-label', 'Fermer la fenêtre');
			}
			if (overlay) overlay.onclick = fermerPopup;
			
			// Focus sur le bouton fermer
			if (closeBtn) closeBtn.focus();
			
			// Gestion du clavier avec focus trap
			if (currentKeyHandler) {
				document.removeEventListener('keydown', currentKeyHandler);
			}
			currentKeyHandler = function(e) {
				if (e.key === 'Escape') {
					fermerPopup();
					return;
				}
				
				// Focus trap: Tab reste dans la modal
				if (e.key === 'Tab') {
					const focusables = modal.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])');
					const first = focusables[0];
					const last = focusables[focusables.length - 1];
					
					if (e.shiftKey && document.activeElement === first) {
						e.preventDefault();
						last.focus();
					} else if (!e.shiftKey && document.activeElement === last) {
						e.preventDefault();
						first.focus();
					}
				}
			};
			document.addEventListener('keydown', currentKeyHandler);
		}
		
		// Charger le calendrier avec retry
		async function chargerCalendrierAvecRetry() {
			for (let attempt = 0; attempt <= CONFIG.RETRY_ATTEMPTS; attempt++) {
				const result = await chargerCalendrier();
				if (result.length > 0 || attempt === CONFIG.RETRY_ATTEMPTS) {
					return result;
				}
				console.log('🔄 Retry', attempt + 1, '/', CONFIG.RETRY_ATTEMPTS);
				await new Promise(r => setTimeout(r, CONFIG.RETRY_DELAY));
			}
			return [];
		}
		
		// Lancement avec gestion d'erreur globale
		document.addEventListener('DOMContentLoaded', async () => {
			const feed = document.getElementById('telegram-feed');
			if (!feed) {
				console.error('❌ Element #telegram-feed non trouvé');
				return;
			}
			
			// Initialiser le gestionnaire de resize Telegram
			initTelegramResizeHandler();
			
			try {
				afficherChargement(feed);
				await chargerCalendrierAvecRetry();
				feed.innerHTML = ''; // Vider le loader
				genererPostsTelegram();
				
				// Vérifier si des posts ont été ajoutés
				if (feed.children.length === 0) {
					afficherErreur(feed, 'Aucun post à afficher');
				}
				
				console.log('🎉 Module Telegram Actus initialisé');
			} catch (e) {
				console.error('❌ Erreur initialisation:', e);
				feed.innerHTML = '';
				afficherErreur(feed, 'Erreur de chargement - Réessayez plus tard');
			}
		});
	})();
	</script>
