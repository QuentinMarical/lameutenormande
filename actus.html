	<!-- Script pour lier les événements du calendrier -->
	<script>
	(function() {
		'use strict';
		
		// URLs du fichier iCal - D'abord local (généré par GitHub Actions), puis fallback
		const ICAL_URLS = [
			'events.ics',                    // Fichier local (même dossier)
			'assets/events.ics',             // Fichier dans assets
			'./events.ics',                  // Relatif
			window.location.origin + '/events.ics'  // URL absolue du site
		];
		
		let calendarEvents = [];
		let icalLoaded = false;
		
		// Charger ICAL.js dynamiquement depuis jsDelivr (meilleur support)
		function loadICALScript() {
			return new Promise((resolve, reject) => {
				if (typeof ICAL !== 'undefined') {
					resolve();
					return;
				}
				const script = document.createElement('script');
				script.src = 'https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js';
				script.onload = resolve;
				script.onerror = () => {
					// Fallback sur une autre CDN
					const script2 = document.createElement('script');
					script2.src = 'https://unpkg.com/ical.js@1.5.0/build/ical.min.js';
					script2.onload = resolve;
					script2.onerror = reject;
					document.head.appendChild(script2);
				};
				document.head.appendChild(script);
			});
		}
		
		// Charger les événements du calendrier avec fallback
		async function loadCalendarEvents() {
			try {
				await loadICALScript();
			} catch (e) {
				console.log('ICAL.js non disponible');
				return;
			}
			
			for (const url of ICAL_URLS) {
				try {
					const response = await fetch(url, { cache: 'no-cache' });
					if (!response.ok) continue;
					
					const icsData = await response.text();
					if (typeof ICAL !== 'undefined' && icsData.includes('BEGIN:VCALENDAR')) {
						const jcalData = ICAL.parse(icsData);
						const comp = new ICAL.Component(jcalData);
						const vevents = comp.getAllSubcomponents('vevent');
						
						calendarEvents = vevents.map(vevent => {
							const event = new ICAL.Event(vevent);
							const description = event.description || '';
							
							// Extraire l'identifiant depuis la description (format: [ID:xxx] ou #ID-xxx)
							let eventId = '';
							const idMatch = description.match(/\[ID:([^\]]+)\]/) || description.match(/#ID-([^\s\n]+)/);
							if (idMatch) {
								eventId = idMatch[1].trim().toLowerCase();
							}
							
							return {
								id: eventId,
								title: event.summary || '',
								description: description,
								location: event.location || '',
								startDate: event.startDate ? event.startDate.toJSDate() : null,
								endDate: event.endDate ? event.endDate.toJSDate() : null,
								url: vevent.getFirstPropertyValue('url') || ''
							};
						});
						console.log('Calendrier chargé depuis:', url, '-', calendarEvents.length, 'événements');
						
						// DEBUG: Afficher les événements avec ID
						const eventsWithId = calendarEvents.filter(e => e.id);
						console.log('Événements avec ID:', eventsWithId.length);
						eventsWithId.forEach(e => console.log('  -', e.title, '| ID:', e.id));
						
						// Exposer pour debug console
						window._calendarEvents = calendarEvents;
						
						icalLoaded = true;
						return; // Succès, on arrête
					}
				} catch (error) {
					console.log('Tentative échouée:', url);
				}
			}
			console.log('Calendrier non disponible - les liens événements seront désactivés');
		}
		
		// Trouver un événement par son ID ou son nom
		function findEventByIdOrName(id, name) {
			if (!calendarEvents.length) return null;
			
			// D'abord chercher par ID (plus fiable)
			if (id && id.trim() !== '') {
				const searchId = id.toLowerCase().trim();
				const byId = calendarEvents.find(event => event.id === searchId);
				if (byId) return byId;
			}
			
			// Sinon chercher par nom
			if (name && name.trim() !== '') {
				const searchName = name.toLowerCase().trim();
				return calendarEvents.find(event => {
					const eventTitle = event.title.toLowerCase();
					return eventTitle.includes(searchName) || searchName.includes(eventTitle);
				});
			}
			
			return null;
		}
		
		// Fermer la modal
		function closeEventModal() {
			const modal = document.querySelector('.event-modal');
			if (modal) {
				modal.classList.add('closing');
				document.body.classList.remove('modal-open');
				setTimeout(() => {
					modal.classList.remove('show', 'closing');
				}, 300);
			}
		}
		
		// Ouvrir la modal avec les détails de l'événement
		function openEventModal(event) {
			const modal = document.querySelector('.event-modal');
			const modalTitle = document.querySelector('.event-modal-title');
			const modalBody = document.querySelector('.event-modal-body');
			
			if (!modal || !modalTitle || !modalBody) return;
			
			// Titre
			modalTitle.textContent = event.title || 'Événement';
			
			// Formater les dates
			const startDate = new Date(event.startDate);
			const endDate = event.endDate ? new Date(event.endDate) : null;
			
			const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
			const timeOptions = { hour: '2-digit', minute: '2-digit' };
			
			let dateStr = startDate.toLocaleDateString('fr-FR', dateOptions);
			let timeStr = startDate.toLocaleTimeString('fr-FR', timeOptions);
			
			if (endDate) {
				const sameDay = startDate.toDateString() === endDate.toDateString();
				if (sameDay) {
					timeStr += ' - ' + endDate.toLocaleTimeString('fr-FR', timeOptions);
				} else {
					dateStr += ' au ' + endDate.toLocaleDateString('fr-FR', dateOptions);
				}
			}
			
			// Construire le contenu
			let bodyHTML = '<div class="event-modal-body-grid">';
			bodyHTML += '<div class="event-modal-left">';
			
			// Date
			bodyHTML += `
				<div class="event-info-row">
					<span class="event-info-icon">📅</span>
					<div class="event-info-content">
						<div class="event-info-label">Date</div>
						<div class="event-info-text">${dateStr}</div>
					</div>
				</div>
			`;
			
			// Heure
			bodyHTML += `
				<div class="event-info-row">
					<span class="event-info-icon">⏰</span>
					<div class="event-info-content">
						<div class="event-info-label">Horaire</div>
						<div class="event-info-text">${timeStr}</div>
					</div>
				</div>
			`;
			
			// Lieu
			if (event.location) {
				const encodedLocation = encodeURIComponent(event.location);
				bodyHTML += `
					<div class="event-info-row">
						<span class="event-info-icon">📍</span>
						<div class="event-info-content">
							<div class="event-info-label">Lieu</div>
							<div class="event-info-text">${event.location}</div>
							<div class="event-location-buttons">
								<a href="https://www.google.com/maps/search/?api=1&query=${encodedLocation}" target="_blank" class="location-btn location-google">🗺️ Google Maps</a>
								<a href="https://waze.com/ul?q=${encodedLocation}" target="_blank" class="location-btn location-waze">🚗 Waze</a>
								<a href="https://maps.apple.com/?q=${encodedLocation}" target="_blank" class="location-btn location-apple">🌍 Apple Plans</a>
							</div>
						</div>
					</div>
				`;
			}
			
			bodyHTML += '</div><div class="event-modal-right">';
			
			// Description
			if (event.description) {
				// Convertir les URLs en liens cliquables
				let desc = event.description.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
				desc = desc.replace(/\n/g, '<br>');
				
				bodyHTML += `
					<div class="event-info-row">
						<span class="event-info-icon">📝</span>
						<div class="event-info-content">
							<div class="event-info-label">Description</div>
							<div class="event-info-text">${desc}</div>
						</div>
					</div>
				`;
			}
			
			// Lien URL
			if (event.url) {
				bodyHTML += `
					<div class="event-info-row">
						<span class="event-info-icon">🔗</span>
						<div class="event-info-content">
							<div class="event-info-label">Plus d'infos</div>
							<a href="${event.url}" target="_blank" class="event-url-button">Voir le site de l'événement</a>
						</div>
					</div>
				`;
			}
			
			bodyHTML += '</div></div>';
			
			modalBody.innerHTML = bodyHTML;
			
			// Afficher la modal
			document.body.classList.add('modal-open');
			modal.classList.add('show');
			modal.setAttribute('role', 'dialog');
			
			// Event listeners pour fermer
			const closeBtn = modal.querySelector('.event-modal-close');
			const overlay = modal.querySelector('.event-modal-overlay');
			
			closeBtn.onclick = closeEventModal;
			overlay.onclick = closeEventModal;
			
			// Fermer avec Escape
			document.addEventListener('keydown', function escHandler(e) {
				if (e.key === 'Escape') {
					closeEventModal();
					document.removeEventListener('keydown', escHandler);
				}
			});
		}
		
		// Scanner les posts Telegram pour les événements
		function scanTelegramPosts() {
			// Scanner les articles existants après un délai pour laisser les iframes charger
			setTimeout(() => {
				document.querySelectorAll('.telegram-article').forEach(article => {
					processArticle(article);
				});
			}, 1500);
			
			// Observer pour les nouveaux iframes
			const observer = new MutationObserver((mutations) => {
				mutations.forEach((mutation) => {
					mutation.addedNodes.forEach((node) => {
						if (node.nodeType === Node.ELEMENT_NODE) {
							const iframes = node.querySelectorAll ? node.querySelectorAll('iframe') : [];
							iframes.forEach(iframe => {
								const article = iframe.closest('.telegram-article');
								if (article) {
									setTimeout(() => processArticle(article), 500);
								}
							});
						}
					});
				});
			});
			
			observer.observe(document.body, { childList: true, subtree: true });
		}
		
		// Traiter un article : vérifier le data-event-id/name et ajouter le bouton
		function processArticle(article) {
			if (!article || !calendarEvents.length) return;
			
			// Éviter les doublons
			if (article.querySelector('.event-arrow-btn')) return;
			
			// Récupérer l'ID et/ou le nom de l'événement
			const eventId = article.getAttribute('data-event-id') || '';
			const eventName = article.getAttribute('data-event-name') || '';
			
			console.log('Processing article - ID:', eventId, '| Name:', eventName);
			
			if (!eventId && !eventName) return;
			if (eventId.trim() === '' && eventName.trim() === '') return;
			
			// Chercher l'événement correspondant dans le calendrier
			const event = findEventByIdOrName(eventId, eventName);
			if (!event) {
				console.log('❌ Événement non trouvé dans le calendrier:', eventId || eventName);
				return;
			}
			
			console.log('✅ Événement trouvé:', event.title);
			
			// Ajouter le bouton
			addEventButton(article, event);
		}
		
		// Ajouter le bouton événement à l'article
		function addEventButton(article, event) {
			// Ajouter la classe pour le style
			article.classList.add('has-event');
			
			// Créer le bouton fléché
			const arrowBtn = document.createElement('button');
			arrowBtn.className = 'event-arrow-btn';
			arrowBtn.title = 'Voir les détails de ' + event.title;
			arrowBtn.innerHTML = '<span class="arrow-icon">▶</span>';
			
			// Ajouter le listener sur le bouton
			arrowBtn.addEventListener('click', () => {
				openEventModal(event);
			});
			
			// Insérer le bouton à la fin de l'article (après le wrapper)
			article.appendChild(arrowBtn);
			console.log('Bouton événement ajouté pour:', event.title);
		}
		
		// Ajouter des liens vers les événements si détectés (fallback)
		function addEventLinksToContainer(container) {
			if (!container || !calendarEvents.length) return;
			checkAndAddEventBadge(container);
		}
		
		// Initialisation
		document.addEventListener('DOMContentLoaded', async () => {
			await loadCalendarEvents();
			scanTelegramPosts();
		});
	})();
	</script>
