            function extractDeptCodeFromLocation(location) {
                if (!location) return null;
                // Match a 5-digit French postal code

                    // Handle Corsica: 20000-20999 -> 2A or 2B

                        return num < 20200 ? '2A' : '2B';
                    }
                    // DOM-TOM: 97x
                    if (postal.startsWith('97')) {
                        return postal.substring(0, 3);
                    }
                    return postal.substring(0, 2);
                }
                return null;
            }

            // Geocoding cache: city name -> dept code
            const geocodeCache = {};

            async function geocodeCityToDept(query) {
                if (!query || query.length < 2) return null;
                const cacheKey = query.toLowerCase().trim();
                if (geocodeCache[cacheKey] !== undefined) return geocodeCache[cacheKey];
                try {
                    const resp = await fetch('https://api-adresse.data.gouv.fr/search/?q=' + encodeURIComponent(query) + '&limit=1&type=municipality');
                    if (!resp.ok) { geocodeCache[cacheKey] = null; return null; }
                    const data = await resp.json();
                    if (data.features && data.features.length > 0) {
                        const props = data.features[0].properties;
                        const postcode = props.postcode || '';
                        if (postcode.length >= 5) {
                            const code = extractDeptCodeFromPostal(postcode);
                            geocodeCache[cacheKey] = code;
                            return code;
                        }
                        // Fallback: use citycode (INSEE code, first 2 digits = dept)
                        const citycode = props.citycode || '';
                        if (citycode.length >= 2) {
                            let code;
                            if (citycode.startsWith('2A') || citycode.startsWith('2B')) {
                                code = citycode.substring(0, 2);
                            } else if (citycode.startsWith('97')) {
                                code = citycode.substring(0, 3);
                            } else {
                                code = citycode.substring(0, 2);
                            }
                            geocodeCache[cacheKey] = code;
                            return code;
                        }
                    }
                    geocodeCache[cacheKey] = null;
                    return null;
                } catch (e) {
                    console.warn('Geocoding error for "' + query + '":', e.message);
                    geocodeCache[cacheKey] = null;
                    return null;
                }
            }

            function extractDeptCodeFromPostal(postal) {
                if (postal.startsWith('20')) {
                    const num = parseInt(postal, 10);
                    return num < 20200 ? '2A' : '2B';
                }
                if (postal.startsWith('97')) return postal.substring(0, 3);
                return postal.substring(0, 2);
            }

            function extractCityFromLocation(location) {
                if (!location) return null;
                // Remove postal codes, country names, street numbers, common noise
                let cleaned = location
                    .replace(/\b\d{5}\b/g, '')
                    .replace(/\b(France|FR)\b/gi, '')
                    .replace(/\b\d{1,4}\s*(rue|avenue|boulevard|allée|chemin|route|place|impasse|bd|av)\b/gi, '')
                    .replace(/\b(rue|avenue|boulevard|allée|chemin|route|place|impasse|bd|av)\s+[^\s,]+/gi, '')
                    .replace(/[,;]/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
                // Take the last meaningful word group (often the city)
                const parts = cleaned.split(/\s{2,}|\s+-\s+/).map(s => s.trim()).filter(s => s.length > 1);
                if (parts.length > 0) return parts[parts.length - 1];
                if (cleaned.length > 1) return cleaned;
                return null;
            }

            async function resolveAllEventLocations(events) {
                const toResolve = [];
                events.forEach(ev => {
                    const loc = ev.extendedProps?.location || '';
                    const deptFromPostal = extractDeptCodeFromLocation(loc);
                    if (deptFromPostal) {
                        ev.extendedProps.resolvedDeptCode = deptFromPostal;
                    } else if (loc.trim()) {
                        toResolve.push(ev);
                    }
                });
                // Batch geocode events without postal codes (throttled, max 5 at a time)
                const batchSize = 5;
                for (let i = 0; i < toResolve.length; i += batchSize) {
                    const batch = toResolve.slice(i, i + batchSize);
                    await Promise.all(batch.map(async ev => {
                        const loc = ev.extendedProps?.location || '';
                        const city = extractCityFromLocation(loc);
                        if (city) {
                            const code = await geocodeCityToDept(city);
                            if (code) {
                                ev.extendedProps.resolvedDeptCode = code;
                            } else {
                                // Try with full location string as fallback
                                const code2 = await geocodeCityToDept(loc);
                                if (code2) ev.extendedProps.resolvedDeptCode = code2;
                            }
                        }
                    }));
                }
            }

            function getEventDeptCode(ev) {
                // Use pre-resolved code if available
                if (ev.extendedProps?.resolvedDeptCode) return ev.extendedProps.resolvedDeptCode;
                return extractDeptCodeFromLocation(ev.extendedProps?.location || '');
            }

            function populateRegionSelect() {
                const regSelect = document.getElementById('filter-region');
                if (!regSelect) return;
                regSelect.innerHTML = '<option value="all" selected>Partout</option><option value="hors-france">Hors France 🌍</option>';
                Object.keys(REGIONS_DEPARTMENTS).forEach(region => {
                    const opt = document.createElement('option');
                    opt.value = 'region:' + region;
                    opt.textContent = region;
                    opt.className = 'filter-option-region';
                    regSelect.appendChild(opt);
                });
            }

            function populateDetailSelect(region) {
                const detailSelect = document.getElementById('filter-detail');
                const detailWrap = document.getElementById('filter-detail-wrap');
                if (!detailSelect || !detailWrap) return;
                if (!region || region === 'all') {
                    detailWrap.classList.remove('visible');
                    setTimeout(() => {
                        detailSelect.innerHTML = '<option value="all" selected>Toute la région</option>';
                    }, 400);
                    return;
                }
                detailSelect.innerHTML = '<option value="all" selected>Toute la région</option>';
                const depts = REGIONS_DEPARTMENTS[region];
                if (!depts) return;
                const oldRegs = OLD_REGIONS[region];
                if (oldRegs) {
                    Object.entries(oldRegs).forEach(([oldName, oldCodes]) => {
                        // Old region header
                        const oldOpt = document.createElement('option');
                        oldOpt.value = 'oldregion:' + oldName;
                        oldOpt.textContent = '\u25b9 ' + oldName;
                        oldOpt.className = 'filter-option-oldregion';
                        detailSelect.appendChild(oldOpt);
                        // Departments belonging to this old region
                        depts.filter(d => oldCodes.includes(getDeptCode(d))).forEach(d => {
                            const opt = document.createElement('option');
                            opt.value = 'dept:' + getDeptCode(d);
                            opt.textContent = '\u00A0\u00A0\u00A0' + d;
                            opt.className = 'filter-option-dept';
                            detailSelect.appendChild(opt);
                        });
                    });
                } else {
                    depts.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = 'dept:' + getDeptCode(d);
                        opt.textContent = d;
                        opt.className = 'filter-option-dept';
                        detailSelect.appendChild(opt);
                    });
                }
                requestAnimationFrame(() => { detailWrap.classList.add('visible'); });
            }

            function getFilteredEvents() {
                const typeFilter = document.getElementById('filter-type')?.value || 'all';
                const regionFilter = document.getElementById('filter-region')?.value || 'all';
                const detailFilter = document.getElementById('filter-detail')?.value || 'all';

                return allLoadedEvents.filter(ev => {
                    // Type filter
                    const foxEmojiRegex = /\u{1F98A}/u;
                    const isFurry = typeof ev.title === 'string' && foxEmojiRegex.test(ev.title);
                    if (typeFilter === 'furry' && !isFurry) return false;
                    if (typeFilter === 'standard' && isFurry) return false;

                    // Region filter
                    if (regionFilter === 'hors-france') {
                        // Hors France : événements SANS code postal français
                        const eventDeptCode = getEventDeptCode(ev);
                        if (eventDeptCode) return false; // A un dept français → exclu
                        return true;
                    }

                    if (regionFilter !== 'all') {
                        const eventDeptCode = getEventDeptCode(ev);
                        if (!eventDeptCode) return false;
                        const filterRegion = regionFilter.substring(7);
                        const eventRegion = DEPT_CODE_TO_REGION[eventDeptCode];
                        if (eventRegion !== filterRegion) return false;

                        // Detail filter (old region or department)
                        if (detailFilter !== 'all') {
                            if (detailFilter.startsWith('dept:')) {
                                if (eventDeptCode !== detailFilter.substring(5)) return false;
                            } else if (detailFilter.startsWith('oldregion:')) {
                                const eventOldRegion = DEPT_CODE_TO_OLD_REGION[eventDeptCode];
                                if (eventOldRegion !== detailFilter.substring(10)) return false;
                            }
                        }
                    }

                    return true;
                });
            }

            function saveFilterSettings() {
                const saveCheckbox = document.getElementById('filter-save');
                if (!saveCheckbox || !saveCheckbox.checked) return;
                const settings = {
                    type: document.getElementById('filter-type')?.value || 'all',
                    region: document.getElementById('filter-region')?.value || 'all',
                    detail: document.getElementById('filter-detail')?.value || 'all'
                };
                try {
                    localStorage.setItem('calendarFilterSettings', JSON.stringify(settings));
                    localStorage.setItem('calendarFilterSave', 'true');
                } catch(e) { /* storage blocked */ }
            }

            function restoreFilterSettings() {
                let saved = null;
                try { saved = localStorage.getItem('calendarFilterSave'); } catch(e) { /* storage blocked */ }
                const saveCheckbox = document.getElementById('filter-save');
                if (!saved || saved !== 'true' || !saveCheckbox) return false;
                saveCheckbox.checked = true;
                try {
                    const settings = JSON.parse(localStorage.getItem('calendarFilterSettings'));
                    if (!settings) return false;
                    const filterType = document.getElementById('filter-type');
                    const filterRegion = document.getElementById('filter-region');
                    if (filterType && settings.type) filterType.value = settings.type;
                    if (filterRegion && settings.region) {
                        filterRegion.value = settings.region;
                        if (settings.region !== 'all') {
                            const regionName = settings.region.substring(7);
                            populateDetailSelect(regionName);
                            const filterDetail = document.getElementById('filter-detail');
                            if (filterDetail && settings.detail) filterDetail.value = settings.detail;
                        }
                    }
                    return true;
                } catch (e) { return false; }
            }

            function applyFilters() {
                saveFilterSettings();
                const wrapper = document.getElementById('calendar-wrapper');
                if (wrapper) wrapper.classList.add('calendar-filtering');
                setTimeout(() => {
                    loadedEvents = consolidateMultiDayEvents(getFilteredEvents());
                    if (calendar) {
                        calendar.removeAllEvents();
                        calendar.addEventSource(loadedEvents);
                    }
                    if (wrapper) wrapper.classList.remove('calendar-filtering');
                }, 250);
            }

            function closeEventModal() {
                const modal = document.querySelector('.event-modal');
                if (!modal || !modal.classList.contains('show')) return;

                modal.classList.add('closing');
                modal.setAttribute('aria-hidden', 'true');
                document.body.classList.remove('modal-open');

                setTimeout(() => {
                    modal.classList.remove('show', 'closing');
                }, 250);
            }

            function updateMonthLabel(date) {
                const monthEl = document.querySelector('.calendar-month');
                if (monthEl && date) {
                    monthEl.textContent = monthNames[date.getMonth()] + ' ' + date.getFullYear();
                }
            }

            function consolidateMultiDayEvents(events) {
                // Regroupe les événements par id
                const map = {};
                events.forEach(ev => {
                    // Utiliser l'ID unique comme clé (pas start qui peut varier)
                    const key = ev.id || (ev.title + '_' + (ev.start ? ev.start.toISOString() : Math.random()));
                    if (!map[key]) {
                        map[key] = { ...ev };
                    } else {
                        // Fusionner les dates si besoin
                        if (ev.start && (!map[key].start || ev.start < map[key].start)) map[key].start = ev.start;
                        if (ev.end && (!map[key].end || ev.end > map[key].end)) map[key].end = ev.end;
                        map[key].extendedProps = { ...(map[key].extendedProps || {}), ...(ev.extendedProps || {}) };
                    }
                });

                const now = new Date();
                return Object.values(map).map(ev => {
                    const startDate = ev.start || (ev.extendedProps && ev.extendedProps.startDate) || null;
                    const endDate = ev.end || (ev.extendedProps && ev.extendedProps.endDate) || null;
                    const isPast = endDate && endDate < now;
                    const isNow = startDate && endDate && startDate <= now && endDate >= now;
                    const isFuture = startDate && startDate > now;
                    const classes = [];
                    const foxEmojiRegex = /\u{1F98A}/u;
                    const globeEmojiRegex = /\u{1F30D}/u;
                    const hasFox = typeof ev.title === 'string' && foxEmojiRegex.test(ev.title);
                    const hasGlobe = typeof ev.title === 'string' && globeEmojiRegex.test(ev.title);
                    if (isPast) classes.push('fc-event-past');
                    else if (isNow) classes.push('fc-event-now');
                    else if (isFuture) {
                        if (hasFox) {
                            classes.push('fc-event-future', 'fc-event-fox');
                            ev.extendedProps = ev.extendedProps || {};
                            ev.extendedProps.backgroundColor = ev.extendedProps.backgroundColor || 'linear-gradient(135deg, #ff9800, #ff3d00)';
                            ev.extendedProps.borderColor = ev.extendedProps.borderColor || '#ff9800';
                            ev.extendedProps.textColor = ev.extendedProps.textColor || '#fff';
                        } else if (hasGlobe) {
                            classes.push('fc-event-future', 'fc-event-globe');
                            ev.extendedProps = ev.extendedProps || {};
                            ev.extendedProps.backgroundColor = ev.extendedProps.backgroundColor || 'linear-gradient(135deg, #2196f3, #03a9f4)';
                            ev.extendedProps.borderColor = ev.extendedProps.borderColor || '#2196f3';
                            ev.extendedProps.textColor = ev.extendedProps.textColor || '#fff';
                        } else {
                            classes.push('fc-event-future');
                        }
                    }
                    // NE PAS réinitialiser listIgnore ici — c'est initCalendar qui le fait
                    return {
                        ...ev,
                        classNames: classes,
                        id: ev.id
                    };
                });
            }

            function pruneOuterMonthRows() {
                if (!calendar || currentView !== 'dayGridMonth') return;
                const calendarEl = document.querySelector('.fullcalendar-container');
                if (!calendarEl) return;
                const view = calendar.view;
                if (!view || !view.currentStart) return;
                const targetMonth = view.currentStart.getMonth();
                const body = calendarEl.querySelector('.fc-daygrid-body');
                if (!body) return;
                const rows = body.querySelectorAll('tr');
                rows.forEach(row => {
                    const cells = row.querySelectorAll('.fc-daygrid-day');
                    let hasCurrent = false;
                    cells.forEach(cell => {
                        const dateStr = cell.getAttribute('data-date');
                        if (dateStr) {
                            const d = new Date(dateStr + 'T00:00:00');
                            if (!isNaN(d) && d.getMonth() === targetMonth) {
                                hasCurrent = true;
                            }
                        }
                    });
                    if (!hasCurrent) {
                        row.style.display = 'none';
                    } else {
                        row.style.display = '';
                    }
                });
                setTimeout(() => { if (calendar) calendar.updateSize(); }, 30);
            }

            function initCalendar(viewName) {
                const calendarEl = document.querySelector('.fullcalendar-container');
                const wrapper = document.getElementById('calendar-wrapper');

                if (calendar !== null) calendar.destroy();
                resizeWrapperHeight();

                // For list view, flatten multi-day events to single-day to avoid duplicates
                let viewEvents = loadedEvents;
                if (viewName.startsWith('list')) {
                    // Pour chaque multi-jour, ne garder que le premier jour, marquer les autres comme ignorés
                    const seen = {};
                    viewEvents = loadedEvents.map(ev => {
                        const key = ev.id || ev.title;
                        const start = ev.start || (ev.extendedProps && ev.extendedProps.startDate);
                        const end = ev.end || (ev.extendedProps && ev.extendedProps.endDate);
                        const isMultiDay = start && end && (end - start) >= 24 * 60 * 60 * 1000;

                        if (isMultiDay) {
                            if (seen[key]) {
                                // Déjà vu → marquer comme ignoré
                                return { ...ev, extendedProps: { ...(ev.extendedProps || {}), listIgnore: true } };
                            }
                            seen[key] = true;
                            // Premier jour → ajuster la fin pour n'afficher qu'un seul jour
                            return {
                                ...ev,
                                end: ev.allDay ? new Date(start.getTime() + 24 * 60 * 60 * 1000) : start,
                                extendedProps: { ...(ev.extendedProps || {}), listIgnore: false }
                            };
                        }
                        // Pas multi-jour → afficher normalement
                        return { ...ev, extendedProps: { ...(ev.extendedProps || {}), listIgnore: false } };
                    });
                }

                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: viewName,
                    initialDate: currentDate,
                    locale: 'fr',
                    firstDay: 1,
                    headerToolbar: false,
                    showNonCurrentDates: false,
                    height: '100%',
                    contentHeight: 'auto',
                    expandRows: true,
                    dayMaxEvents: false,
                    dayMaxEventRows: false,
                    eventMaxStack: 99,
                    eventDisplay: 'block',
                    allDaySlot: true,
                    slotMinTime: '06:00:00',
                    slotMaxTime: '23:00:00',
                    slotLabelInterval: '01:00:00',
                    events: viewEvents,
                    noEventsContent: '',
                    eventClick: function (info) {
                        info.jsEvent.preventDefault();
                        openEventModal(info.event, info.event.extendedProps);
                    },
                    eventContent: function (arg) {
                        const isFCD = arg.event.title && arg.event.title.toUpperCase().includes('FCD');
                        const logoHtml = isFCD ? `<img src="${NORMANDIFURS_LOGO}" class="event-logo-normandifurs" alt="" title="Événement organisé par NormandiFurs">` : '';
                        if (arg.view.type.startsWith('list')) {
                            const props = arg.event.extendedProps || {};
                            if (props.listIgnore) return { domNodes: [] };
                            const start = props.startDate || arg.event.start;
                            const end = props.endDate || arg.event.end;
                            let html = '';
                            let nbJours = 1;
                            let isAllDay = arg.event.allDay;
                            const hideStart = props.hideStartTime;
                            if (start && end && end - start >= 24 * 60 * 60 * 1000) {
                                const options = { day: '2-digit', month: 'short', year: 'numeric' };
                                let displayEnd = end;
                                if (isAllDay) {
                                    displayEnd = new Date(end.getTime() - 24 * 60 * 60 * 1000);
                                }
                                const startStr = start.toLocaleDateString('fr-FR', options);
                                const endStr = displayEnd.toLocaleDateString('fr-FR', options);
                                nbJours = Math.round((displayEnd - start) / (24 * 60 * 60 * 1000)) + 1;
                                html += `<div class="fc-event-title">${logoHtml}${arg.event.title} <span class="multi-days-span" style="font-weight:normal;font-size:0.95em;margin-left:0.5em;color:#ffc107;">(${nbJours} jour${nbJours > 1 ? 's' : ''})</span></div>`;
                                html += `<div class="fc-list-event-time" style="font-weight:bold;">Du ${startStr} au ${endStr}</div>`;
                            } else {
                                html += `<div class="fc-event-title">${logoHtml}${arg.event.title}</div>`;
                            }
                            return { html };
                        }
                        if (isFCD) {
                            return { html: `<div class="fc-event-main-frame">${logoHtml}<div class="fc-event-title-container"><div class="fc-event-title fc-sticky">${arg.event.title}</div></div></div>` };
                        }
                        return true;
                    },
                    eventDidMount: function (info) {
                        // Cacher les événements marqués comme ignorés (doublons vue liste)
                        const listIgnore = info.event.extendedProps && info.event.extendedProps.listIgnore;
                        if (listIgnore && info.el) {
                            info.el.style.display = 'none';
                            return;
                        }

                        const bg = info.event.extendedProps && info.event.extendedProps.backgroundColor;
                        const border = info.event.extendedProps && info.event.extendedProps.borderColor;
                        const txt = info.event.extendedProps && info.event.extendedProps.textColor;
                        if (bg && info.el) {
                            info.el.style.background = bg;
                            if (border) info.el.style.borderColor = border;
                            if (txt) info.el.style.color = txt;
                        }
                        try {
                            const hideTime = info.event.extendedProps && info.event.extendedProps.hideStartTime;
                            if (hideTime && info.el) {
                                const timeEls = info.el.querySelectorAll('.fc-time, .fc-event-time, .fc-list-event-time, .fc-list-event .fc-event-time');
                                timeEls.forEach(el => el.style.display = 'none');
                            }
                        } catch (e) { }
                    },
                    datesSet: function (info) {
                        if (updateTimeout) clearTimeout(updateTimeout);
                        updateTimeout = setTimeout(() => {
                            const displayDate = info.view.currentStart || info.start;
                            updateMonthLabel(displayDate);
                            pruneOuterMonthRows();
                        }, 50);
                    }
                });

                calendar.render();
                currentView = viewName;
                updateMonthLabel(currentDate);

                setTimeout(() => {
                    resizeWrapperHeight();
                    if (calendar) calendar.updateSize();
                    pruneOuterMonthRows();
                }, 100);
            }

            function toggleView() {
                const btnToggleView = document.getElementById('btn-toggle-view');
                const calendarZone = document.querySelector('.calendar-zone');

                if (currentView === 'dayGridMonth') {
                    initCalendar('listMonth');
                    if (btnToggleView) btnToggleView.textContent = 'Vue Calendrier';
                    if (calendarZone) calendarZone.classList.add('list-view-active');
                } else {
                    initCalendar('dayGridMonth');
                    if (btnToggleView) btnToggleView.textContent = 'Vue Liste';
                    if (calendarZone) calendarZone.classList.remove('list-view-active');
                }
            }

            function resizeWrapperHeight() {
                const wrapper = document.getElementById('calendar-wrapper');
                if (!wrapper) return;

                const top = wrapper.getBoundingClientRect().top;
                const bottomMargin = 16;
                const available = window.innerHeight - top - bottomMargin;

                if (available > 200) {
                    wrapper.style.height = available + 'px';

                    if (calendar) {
                        setTimeout(() => {
                            calendar.updateSize();
                        }, 50);
                    }
                }
            }

            function handleOrientationChange() {
                if (isMobile()) {
                    const calendarZone = document.querySelector('.calendar-zone');
                    if (isPortrait()) {
                        const shouldBeList = !allowCalendarView || (allowListView && defaultListViewMobile);

                        if (shouldBeList && currentView !== 'listMonth') {
                            if (calendarZone) calendarZone.classList.add('list-view-active');
                            initCalendar('listMonth');
                            const btnToggleView = document.getElementById('btn-toggle-view');
                            if (btnToggleView) btnToggleView.textContent = 'Vue Calendrier';
                        }
                    } else {
                        const shouldBeCalendar = !allowListView || allowCalendarView;

                        if (!allowCalendarView) return;

                        if (shouldBeCalendar && currentView !== 'dayGridMonth') {
                            if (calendarZone) calendarZone.classList.remove('list-view-active');
                            initCalendar('dayGridMonth');
                            const btnToggleView = document.getElementById('btn-toggle-view');
                            if (btnToggleView) btnToggleView.textContent = 'Vue Liste';
                        }
                    }
                }
            }

            let scrollBlocked = false;

            function toggleScrollLock(state) {
                const body = document.body;

                if (state && !scrollBlocked) {
                    scrollBlocked = true;
                    body.classList.add('scroll-locked');
                    document.documentElement.classList.add('scroll-locked');
                } else if (!state && scrollBlocked) {
                    scrollBlocked = false;
                    body.classList.remove('scroll-locked');
                    document.documentElement.classList.remove('scroll-locked');
                }
            }

            (function () {
                const calendarEl = document.querySelector('.fullcalendar-container');
                const prevBtn = document.querySelector('.calendar-prev');
                const nextBtn = document.querySelector('.calendar-next');
                const todayBtn = document.querySelector('.calendar-today');
                const modalOverlay = document.querySelector('.event-modal-overlay');
                const modalClose = document.querySelector('.event-modal-close');
                const btnToggleView = document.getElementById('btn-toggle-view');

                if (!calendarEl) return;
                if (typeof FullCalendar === 'undefined' || !FullCalendar.Calendar) {
                    const warn = document.createElement('div');
                    warn.style.cssText = 'padding: 1rem; text-align: center; color: #ffc107; background: rgba(255, 193, 7, 0.1); border-radius: 12px; border: 1px solid #ffc107;';
                    warn.innerHTML = '⚠️ Le calendrier n\'a pas pu charger les librairies externes (CDN bloqué).<br><small>Essayez d\'autoriser le site ou utilisez une connexion réseau différente.</small>';
                    calendarEl.appendChild(warn);
                    return;
                }

                if (modalClose) modalClose.onclick = closeEventModal;
                if (modalOverlay) modalOverlay.onclick = closeEventModal;

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeEventModal();
                });

                if (btnToggleView) btnToggleView.onclick = toggleView;

                // Filter event listeners
                const filterType = document.getElementById('filter-type');
                const filterRegion = document.getElementById('filter-region');
                const filterDetail = document.getElementById('filter-detail');

                if (filterType) filterType.onchange = applyFilters;
                if (filterRegion) {
                    filterRegion.onchange = function() {
                        const val = filterRegion.value;
                        if (val === 'hors-france') {
                            // Cacher le select détail pour Hors France
                            const detailWrap = document.getElementById('filter-detail-wrap');
                            if (detailWrap) detailWrap.classList.remove('visible');
                            applyFilters();
                        } else {
                            const regionName = val === 'all' ? null : val.substring(7);
                            populateDetailSelect(regionName);
                            applyFilters();

                            (u) => `https://corsproxy.org/?${encodeURIComponent(u)}` // CorsProxy.org
                        ];
                        
                        for (let proxyIdx = 0; proxyIdx < proxies.length; proxyIdx++) {
                            const isLocalFetch = proxyIdx === 0;
                            const isDirectFetch = proxyIdx === 1;
                            const proxyName = isLocalFetch ? 'Local' : (isDirectFetch ? 'Direct' : 'CORS Proxy');
                            console.log(`   Tentative ${proxyIdx + 1}/4: ${proxyName}`);
                            
                            for (let i = 0; i < maxRetries; i++) {

                                    const proxiedUrl = proxies[proxyIdx](url);

                                            'Accept': 'text/calendar, application/ics, text/plain, */*'
                                        },
                                        cache: 'no-store',
                                        mode: isLocalFetch ? 'same-origin' : 'cors'
                                    });
                                    console.log(`   ✅ Réponse: ${response.status} ${response.statusText}`);
                                    if (response.ok) return response;

                                    if (i === maxRetries - 1 && proxyIdx === proxies.length - 1) throw err;
                                    if (i < maxRetries - 1) {

                                console.error('Dernier erreur:', err);
                                throw new Error(`Impossible de charger le calendrier. Dernier essai: ${err?.message || 'Unknown'}`);
                            }
                            if (!response || !response.ok) {
                                if (loaderBar) loaderBar.style.width = '0%';
                                throw new Error(`HTTP ${response?.status || 'Network Error'}: ${response?.statusText || 'Failed to load calendar'}`);
                            }
                            if (response && response.body && window.ReadableStream) {
                                const reader = response.body.getReader();
                                const contentLength = +response.headers.get('Content-Length') || 0;
                                let receivedLength = 0;
                                let chunks = [];
                                while (true) {
                                    const { done, value } = await reader.read();
                                    if (done) break;
                                    chunks.push(value);
                                    receivedLength += value.length;
                                    if (loaderBar && contentLength) {
                                        const percent = Math.min(100, Math.round(receivedLength / contentLength * 100));
                                        loaderBar.style.width = percent + '%';
                                    } else if (loaderBar) {
                                        loaderBar.style.width = ((receivedLength / 10000) % 100) + '%';
                                    }
                                }
                                let chunksAll = new Uint8Array(receivedLength);
                                let pos = 0;
                                for (let chunk of chunks) {
                                    chunksAll.set(chunk, pos);
                                    pos += chunk.length;
                                }
                                icalText = new TextDecoder('utf-8').decode(chunksAll);
                                if (loaderBar) loaderBar.style.width = '100%';
                            } else {
                                icalText = await response.text();
                                if (loaderBar) loaderBar.style.width = '100%';
                            }
                            if (!icalText || icalText.trim().length === 0) {
                                if (loaderBar) loaderBar.style.width = '0%';

                            }
                            // localStorage cache désactivé - pas de mise en cache locale

                        let jcalData = null;
                        try {
                            jcalData = ICAL.parse(icalText);

                        const comp = new ICAL.Component(jcalData);
                        const vevents = comp.getAllSubcomponents("vevent");
                        loadedEvents = [];

                        const overrideMap = new Map();

                                if (maybeOverride) {

                                    const k = (ev.uid || `event-override-${i}`) + '_' + (ev.startDate ? ev.startDate.toJSDate().toISOString() : i);
                                    overrideMap.set(k, true);

                                const event = new ICAL.Event(vevent);

                                function getEventColors(title, start, now) {
                                    if (title.includes('🦊') && start > now) {
                                        return { backgroundColor: '#ff9800', borderColor: '#ff9800' };
                                    }
                                    if (title.includes('🌍') && start > now) {
                                        return { backgroundColor: '#2196f3', borderColor: '#2196f3' };
                                    }
                                    return { backgroundColor: '#667eea', borderColor: '#667eea' };

                                        let eventUrl = "";

                                            eventUrl = urlProp || attachProp || "";
                                        }
                                        const key = (event.uid || `event-${index}`) + '_' + occStart.toISOString();
                                        if (overrideMap.has(key)) { count++; continue; }
                                        if (!eventMap.has(key)) {
                                            const colors = getEventColors(cleanTitle, occStart, now);
                                            loadedEvents.push({
                                                id: key,
                                                title: cleanTitle,
                                                start: occStart,
                                                end: occEnd,
                                                allDay: !!isAllDay,
                                                display: "block",
                                                backgroundColor: colors.backgroundColor,
                                                borderColor: colors.borderColor,
                                                extendedProps: {
                                                    description: event.description || "",
                                                    location: event.location || "",
                                                    summary: cleanTitle,
                                                    hideStartTime: hasZeroHourInTitle,
                                                    origStart: event.startDate ? event.startDate.toJSDate() : occStart,
                                                    startDate: occStart,
                                                    endDate: occEnd,
                                                    url: eventUrl
                                                }
                                            });
                                            eventMap.set(key, true);
                                        }
                                        count++;
                                    }
                                } else {
                                    let startDate = event.startDate.toJSDate();
                                    let endDate = event.endDate ? event.endDate.toJSDate() : new Date(startDate);
                                    const dtStartProp = vevent.getFirstProperty("dtstart");

                                    if (isAllDay && endDate.getTime() !== startDate.getTime()) {
                                        endDate.setDate(endDate.getDate() + 1);

                                    let cleanTitle = event.summary || "Sans titre";
                                    const hasZeroHourInTitle = /(?:\b00h\b|\b00:00\b)/i.test(event.summary || '');

                                    let eventUrl = "";

                                    }

                                    if (!eventMap.has(key)) {
                                        const now = new Date();
                                        const colors = getEventColors(cleanTitle, startDate, now);
                                        loadedEvents.push({

                                            end: endDate,

                                            backgroundColor: colors.backgroundColor,
