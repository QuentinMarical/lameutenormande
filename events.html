    <script>
        'use strict';

        (function () {
            const monthNames = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];

            const container = document.querySelector('.container-calendar');
            const getAttr = (name) => {
                if (!container) return true;
                const val = container.getAttribute(name);
                return val !== 'false';
            };

            const allowListView = getAttr('data-allow-list-view');
            const allowCalendarView = getAttr('data-allow-calendar-view');
            const defaultListViewMobile = getAttr('data-default-list-view-mobile');

            let calendar = null;
            let currentDate = new Date();
            let updateTimeout = null;
            let currentView = (!allowCalendarView && allowListView) ? 'listMonth' : 'dayGridMonth';
            let loadedEvents = [];
            let allLoadedEvents = [];
            const isMobile = () => window.innerWidth <= 768;
            const isPortrait = () => window.matchMedia('(orientation: portrait)').matches;

            const REGIONS_DEPARTMENTS = {
                'Auvergne-Rhône-Alpes': ['01 Ain','03 Allier','07 Ardèche','15 Cantal','26 Drôme','38 Isère','42 Loire','43 Haute-Loire','63 Puy-de-Dôme','69 Rhône','73 Savoie','74 Haute-Savoie'],
                'Bourgogne-Franche-Comté': ['21 Côte-d\'Or','25 Doubs','39 Jura','58 Nièvre','70 Haute-Saône','71 Saône-et-Loire','89 Yonne','90 Territoire de Belfort'],
                'Bretagne': ['22 Côtes-d\'Armor','29 Finistère','35 Ille-et-Vilaine','56 Morbihan'],
                'Centre-Val de Loire': ['18 Cher','28 Eure-et-Loir','36 Indre','37 Indre-et-Loire','41 Loir-et-Cher','45 Loiret'],
                'Corse': ['2A Corse-du-Sud','2B Haute-Corse'],
                'Grand Est': ['08 Ardennes','10 Aube','51 Marne','52 Haute-Marne','54 Meurthe-et-Moselle','55 Meuse','57 Moselle','67 Bas-Rhin','68 Haut-Rhin','88 Vosges'],
                'Hauts-de-France': ['02 Aisne','59 Nord','60 Oise','62 Pas-de-Calais','80 Somme'],
                'Île-de-France': ['75 Paris','77 Seine-et-Marne','78 Yvelines','91 Essonne','92 Hauts-de-Seine','93 Seine-Saint-Denis','94 Val-de-Marne','95 Val-d\'Oise'],
                'Normandie': ['14 Calvados','27 Eure','50 Manche','61 Orne','76 Seine-Maritime'],
                'Nouvelle-Aquitaine': ['16 Charente','17 Charente-Maritime','19 Corrèze','23 Creuse','24 Dordogne','33 Gironde','40 Landes','47 Lot-et-Garonne','64 Pyrénées-Atlantiques','79 Deux-Sèvres','86 Vienne','87 Haute-Vienne'],
                'Occitanie': ['09 Ariège','11 Aude','12 Aveyron','30 Gard','31 Haute-Garonne','32 Gers','34 Hérault','46 Lot','48 Lozère','65 Hautes-Pyrénées','66 Pyrénées-Orientales','81 Tarn','82 Tarn-et-Garonne'],
                'Pays de la Loire': ['44 Loire-Atlantique','49 Maine-et-Loire','53 Mayenne','72 Sarthe','85 Vendée'],
                'Provence-Alpes-Côte d\'Azur': ['04 Alpes-de-Haute-Provence','05 Hautes-Alpes','06 Alpes-Maritimes','13 Bouches-du-Rhône','83 Var','84 Vaucluse']
            };

            function getDeptCode(deptStr) {
                return deptStr.split(' ')[0];
            }

            function getDeptName(deptStr) {
                return deptStr.substring(deptStr.indexOf(' ') + 1);
            }

            // Old regions (before 2016 reform) mapped to their department codes
            const OLD_REGIONS = {
                'Auvergne-Rhône-Alpes': {
                    'Auvergne': ['03','15','43','63'],
                    'Rhône-Alpes': ['01','07','26','38','42','69','73','74']
                },
                'Bourgogne-Franche-Comté': {
                    'Bourgogne': ['21','58','71','89'],
                    'Franche-Comté': ['25','39','70','90']
                },
                'Grand Est': {
                    'Alsace': ['67','68'],
                    'Champagne-Ardenne': ['08','10','51','52'],
                    'Lorraine': ['54','55','57','88']
                },
                'Hauts-de-France': {
                    'Nord-Pas-de-Calais': ['59','62'],
                    'Picardie': ['02','60','80']
                },
                'Normandie': {
                    'Basse-Normandie': ['14','50','61'],
                    'Haute-Normandie': ['27','76']
                },
                'Nouvelle-Aquitaine': {
                    'Aquitaine': ['24','33','40','47','64'],
                    'Limousin': ['19','23','87'],
                    'Poitou-Charentes': ['16','17','79','86']
                },
                'Occitanie': {
                    'Languedoc-Roussillon': ['11','30','34','48','66'],
                    'Midi-Pyrénées': ['09','12','31','32','46','65','81','82']
                }
            };

            // Build reverse lookup: dept code -> region name
            const DEPT_CODE_TO_REGION = {};
            Object.entries(REGIONS_DEPARTMENTS).forEach(([region, depts]) => {
                depts.forEach(d => {
                    const code = getDeptCode(d);
                    DEPT_CODE_TO_REGION[code] = region;
                });
            });

            // Build reverse lookup: dept code -> old region name
            const DEPT_CODE_TO_OLD_REGION = {};
            Object.entries(OLD_REGIONS).forEach(([newRegion, oldRegions]) => {
                Object.entries(oldRegions).forEach(([oldName, codes]) => {
                    codes.forEach(code => {
                        DEPT_CODE_TO_OLD_REGION[code] = oldName;
                    });
                });
            });

            function extractDeptCodeFromLocation(location) {
                if (!location) return null;
                // Match a 5-digit French postal code
                const match = location.match(/\b(\d{5})\b/);
                if (match) {
                    const postal = match[1];
                    // Handle Corsica: 20000-20999 -> 2A or 2B
                    if (postal.startsWith('20')) {
                        const num = parseInt(postal, 10);
                        return num < 20200 ? '2A' : '2B';
                    }
                    // DOM-TOM: 97x
                    if (postal.startsWith('97')) {
                        return postal.substring(0, 3);
                    }
                    return postal.substring(0, 2);
                }
                return null;
            }

            // Geocoding cache: city name -> dept code
            const geocodeCache = {};

            async function geocodeCityToDept(query) {
                if (!query || query.length < 2) return null;
                const cacheKey = query.toLowerCase().trim();
                if (geocodeCache[cacheKey] !== undefined) return geocodeCache[cacheKey];
                try {
                    const resp = await fetch('https://api-adresse.data.gouv.fr/search/?q=' + encodeURIComponent(query) + '&limit=1&type=municipality');
                    if (!resp.ok) { geocodeCache[cacheKey] = null; return null; }
                    const data = await resp.json();
                    if (data.features && data.features.length > 0) {
                        const props = data.features[0].properties;
                        const postcode = props.postcode || '';
                        if (postcode.length >= 5) {
                            const code = extractDeptCodeFromPostal(postcode);
                            geocodeCache[cacheKey] = code;
                            return code;
                        }
                        // Fallback: use citycode (INSEE code, first 2 digits = dept)
                        const citycode = props.citycode || '';
                        if (citycode.length >= 2) {
                            let code;
                            if (citycode.startsWith('2A') || citycode.startsWith('2B')) {
                                code = citycode.substring(0, 2);
                            } else if (citycode.startsWith('97')) {
                                code = citycode.substring(0, 3);
                            } else {
                                code = citycode.substring(0, 2);
                            }
                            geocodeCache[cacheKey] = code;
                            return code;
                        }
                    }
                    geocodeCache[cacheKey] = null;
                    return null;
                } catch (e) {
                    console.warn('Geocoding error for "' + query + '":', e.message);
                    geocodeCache[cacheKey] = null;
                    return null;
                }
            }

            function extractDeptCodeFromPostal(postal) {
                if (postal.startsWith('20')) {
                    const num = parseInt(postal, 10);
                    return num < 20200 ? '2A' : '2B';
                }
                if (postal.startsWith('97')) return postal.substring(0, 3);
                return postal.substring(0, 2);
            }

            function extractCityFromLocation(location) {
                if (!location) return null;
                // Remove postal codes, country names, street numbers, common noise
                let cleaned = location
                    .replace(/\b\d{5}\b/g, '')
                    .replace(/\b(France|FR)\b/gi, '')
                    .replace(/\b\d{1,4}\s*(rue|avenue|boulevard|allée|chemin|route|place|impasse|bd|av)\b/gi, '')
                    .replace(/\b(rue|avenue|boulevard|allée|chemin|route|place|impasse|bd|av)\s+[^\s,]+/gi, '')
                    .replace(/[,;]/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
                // Take the last meaningful word group (often the city)
                const parts = cleaned.split(/\s{2,}|\s+-\s+/).map(s => s.trim()).filter(s => s.length > 1);
                if (parts.length > 0) return parts[parts.length - 1];
                if (cleaned.length > 1) return cleaned;
                return null;
            }

            async function resolveAllEventLocations(events) {
                const toResolve = [];
                events.forEach(ev => {
                    const loc = ev.extendedProps?.location || '';
                    const deptFromPostal = extractDeptCodeFromLocation(loc);
                    if (deptFromPostal) {
                        ev.extendedProps.resolvedDeptCode = deptFromPostal;
                    } else if (loc.trim()) {
                        toResolve.push(ev);
                    }
                });
                // Batch geocode events without postal codes (throttled, max 5 at a time)
                const batchSize = 5;
                for (let i = 0; i < toResolve.length; i += batchSize) {
                    const batch = toResolve.slice(i, i + batchSize);
                    await Promise.all(batch.map(async ev => {
                        const loc = ev.extendedProps?.location || '';
                        const city = extractCityFromLocation(loc);
                        if (city) {
                            const code = await geocodeCityToDept(city);
                            if (code) {
                                ev.extendedProps.resolvedDeptCode = code;
                            } else {
                                // Try with full location string as fallback
                                const code2 = await geocodeCityToDept(loc);
                                if (code2) ev.extendedProps.resolvedDeptCode = code2;
                            }
                        }
                    }));
                }
            }

            function getEventDeptCode(ev) {
                // Use pre-resolved code if available
                if (ev.extendedProps?.resolvedDeptCode) return ev.extendedProps.resolvedDeptCode;
                return extractDeptCodeFromLocation(ev.extendedProps?.location || '');
            }

            function getFilteredEvents() {
                const typeFilter = document.getElementById('filter-type')?.value || 'all';
                const regionFilter = document.getElementById('filter-region')?.value || 'all';
                const detailFilter = document.getElementById('filter-detail')?.value || 'all';

                return allLoadedEvents.filter(ev => {
                    // Type filter
                    const foxEmojiRegex = /\u{1F98A}/u;
                    const isFurry = typeof ev.title === 'string' && foxEmojiRegex.test(ev.title);
                    if (typeFilter === 'furry' && !isFurry) return false;
                    if (typeFilter === 'standard' && isFurry) return false;

                    // Region filter
                    if (regionFilter !== 'all') {
                        const eventDeptCode = getEventDeptCode(ev);
                        if (!eventDeptCode) return false;
                        const filterRegion = regionFilter.substring(7);
                        const eventRegion = DEPT_CODE_TO_REGION[eventDeptCode];
                        if (eventRegion !== filterRegion) return false;

                        // Detail filter (old region or department)
                        if (detailFilter !== 'all') {
                            if (detailFilter.startsWith('dept:')) {
                                if (eventDeptCode !== detailFilter.substring(5)) return false;
                            } else if (detailFilter.startsWith('oldregion:')) {
                                const eventOldRegion = DEPT_CODE_TO_OLD_REGION[eventDeptCode];
                                if (eventOldRegion !== detailFilter.substring(10)) return false;
                            }
                        }
                    }

                    return true;
                });
            }

            function updateMonthLabel(date) {
                const monthEl = document.querySelector('.calendar-month');
                if (monthEl && date) {
                    monthEl.textContent = monthNames[date.getMonth()] + ' ' + date.getFullYear();
                }
            }

            function consolidateMultiDayEvents(events) {
                const map = {};
                events.forEach(ev => {
                    const key = ev.id || (ev.title + '_' + (ev.start ? ev.start.toISOString() : Math.random()));
                    if (!map[key]) map[key] = { ...ev };
                    else {
                        if (ev.start && (!map[key].start || ev.start < map[key].start)) map[key].start = ev.start;
                        if (ev.end && (!map[key].end || ev.end > map[key].end)) map[key].end = ev.end;
                        map[key].extendedProps = { ...(map[key].extendedProps || {}), ...(ev.extendedProps || {}) };
                    }
                });

                const now = new Date();
                return Object.values(map).map(ev => {
                    const startDate = ev.start || (ev.extendedProps && ev.extendedProps.startDate) || null;
                    const endDate = ev.end || (ev.extendedProps && ev.extendedProps.endDate) || null;
                    const isPast = endDate && endDate < now;
                    const isNow = startDate && endDate && startDate <= now && endDate >= now;
                    const isFuture = startDate && startDate > now;
                    const classes = [];
                    const foxEmojiRegex = /\u{1F98A}/u;
                    const hasFox = typeof ev.title === 'string' && foxEmojiRegex.test(ev.title);
                    if (isPast) classes.push('fc-event-past');
                    else if (isNow) classes.push('fc-event-now');
                    else if (isFuture) {
                        if (hasFox) {
                            classes.push('fc-event-future', 'fc-event-fox');
                            ev.extendedProps = ev.extendedProps || {};
                            ev.extendedProps.backgroundColor = ev.extendedProps.backgroundColor || 'linear-gradient(135deg, #ff9800, #ff3d00)';
                            ev.extendedProps.borderColor = ev.extendedProps.borderColor || '#ff9800';
                            ev.extendedProps.textColor = ev.extendedProps.textColor || '#fff';
                        } else {
                            classes.push('fc-event-future');
                        }
                    }
                    return {
                        ...ev,
                        classNames: classes,
                        id: ev.id
                    };
                });
            }

            // Remove duplicate events based on ID to prevent duplicates in list view
            function deduplicateEvents(events) {
                const eventMap = new Map();
                events.forEach(ev => {
                    if (ev.id && !eventMap.has(ev.id)) {
                        eventMap.set(ev.id, ev);
                    }
                });
                console.log('Deduplication: ' + events.length + ' -> ' + eventMap.size + ' events');
                return Array.from(eventMap.values());
            }

            // Remove empty day headers in list view (days with no visible events)
            function removeEmptyDayHeaders() {
                const listEl = document.querySelector('.fc-list');
                if (!listEl) return;
                
                const tbody = listEl.querySelector('tbody');
                if (!tbody) return;
                
                const rows = Array.from(tbody.querySelectorAll('tr'));
                const toRemove = [];
                
                // Group rows by day header
                let currentDay = null;
                let dayEvents = [];
                
                rows.forEach(row => {
                    if (row.classList.contains('fc-list-day')) {
                        // Process previous day if exists
                        if (currentDay && dayEvents.length === 0) {
                            toRemove.push(currentDay);
                        }
                        currentDay = row;
                        dayEvents = [];
                    } else if (row.classList.contains('fc-list-event') && currentDay) {
                        // Check if event is visible (not hidden by display: none)
                        const isVisible = row.style.display !== 'none' && row.offsetParent !== null;
                        const eventId = row.getAttribute('data-event-id');
                        if (isVisible && eventId) {
                            dayEvents.push(row);
                        }
                    }
                });
                
                // Check last day
                if (currentDay && dayEvents.length === 0) {
                    toRemove.push(currentDay);
                }
                
                // Remove empty day headers
                let removedCount = 0;
                toRemove.forEach(dayRow => {
                    dayRow.remove();
                    removedCount++;
                });
                
                if (removedCount > 0) {
                    console.log('Removed ' + removedCount + ' empty day headers from list view');
                }
            }

        var modal = document.querySelector('.footer-modern .legal-modal');
        var modalTitle = modal ? modal.querySelector('.legal-modal-title') : null;
        var modalBody = modal ? modal.querySelector('.legal-modal-body') : null;
        var modalClose = modal ? modal.querySelector('.legal-modal-close') : null;
        var modalOverlay = modal ? modal.querySelector('.legal-modal-overlay') : null;
        var keyHandler = null;

        function openLegal(key) {
            var data = legalContents[key];
            if (!data || !modal) return;

            modalTitle.textContent = data.title;
            modalBody.innerHTML = data.body;

            document.body.classList.add('modal-open');
            modal.classList.add('show');
            modal.classList.remove('closing');
            modal.setAttribute('aria-hidden', 'false');

            if (keyHandler) document.removeEventListener('keydown', keyHandler);
            keyHandler = function(e) { if (e.key === 'Escape') closeLegal(); };
            document.addEventListener('keydown', keyHandler);

            setTimeout(function() {
                if (modalClose) modalClose.focus();
            }, 50);
        }

        function closeLegal() {
            if (!modal || !modal.classList.contains('show')) return;

            modal.classList.add('closing');
            modal.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('modal-open');

            setTimeout(function() {
                modal.classList.remove('show', 'closing');
            }, 250);

            if (keyHandler) {
                document.removeEventListener('keydown', keyHandler);
                keyHandler = null;
            }
        }

        if (modalClose) modalClose.addEventListener('click', closeLegal);
        if (modalOverlay) modalOverlay.addEventListener('click', closeLegal);

        /* ---------- Boutons légaux ---------- */
        var btns = document.querySelectorAll('.footer-modern .footer-legal-btn');
        for (var i = 0; i < btns.length; i++) {
            btns[i].addEventListener('click', function() {
                openLegal(this.getAttribute('data-legal'));
            });
        }
