    <mbr-parameters>
        <header>Size</header>
        <input type="checkbox" title="Full Screen" name="fullScreen">
        <input type="range" inline title="Top" name="paddingTop" min="0" max="9" step="1" value="7" condition="fullScreen == false">
        <input type="range" inline title="Bottom" name="paddingBottom" min="0" max="9" step="1" value="1" condition="fullScreen == false">

        <header>Background</header>
        <fieldset type="background" name="bg" parallax>
            <input type="image" title="Background Image" value="file:///C:/Users/maric/Desktop/Projet%20Mobirise%20Site%20Meute%20Normande/assets/images/img-2921-2000x1186.jpg" parallax selected>
            <input type="color" title="Background Color" value="#2d2d3d">
            <input type="video" title="Background Video" value>
        </fieldset>
        <input type="checkbox" title="Overlay" name="overlay" condition="bg.type !== 'color'" checked>
        <input type="color" title="Overlay Color" name="overlayColor" value="#1a1a2e" condition="overlay && bg.type !== 'color'">
        <input type="range" inline title="Opacity" name="overlayOpacity" min="0" max="1" step="0.1" value="0.8" condition="overlay && bg.type !== 'color'">

        <header>Calendrier FullCalendar</header>
        <input type="text" title="URL iCalendar" name="icalUrl" value="https://raw.githubusercontent.com/QuentinMarical/lameutenormande/refs/heads/main/events.ics" data-ical-url>

        <header>Contrôles</header>
        <input type="checkbox" title="Autoriser Vue Calendrier" name="allowCalendarView" checked>
        <input type="checkbox" title="Autoriser Vue Liste" name="allowListView" checked>
        <input type="checkbox" title="Vue Liste par défaut (Mobile)" name="defaultListViewMobile" condition="allowListView" checked>
    </mbr-parameters>

    <div class="mbr-overlay" mbr-if="overlay && bg.type!== 'color'" mbr-style="{'opacity': overlayOpacity, 'background-color': overlayColor}">
    </div>

    <!-- FullCalendar v6 & ical.js -->
    <link href="https://unpkg.com/fullcalendar@6.1.15/main.min.css" rel="stylesheet" type="text/css" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js" crossorigin="anonymous"></script>

    <script>
        'use strict';

        (function () {
            const monthNames = ['Janvier', 'Février', 'Mars', 'Avril', 'Mai', 'Juin', 'Juillet', 'Août', 'Septembre', 'Octobre', 'Novembre', 'Décembre'];

            const container = document.querySelector('.container-calendar');
            const getAttr = (name) => {
                if (!container) return true;
                const val = container.getAttribute(name);
                return val !== 'false';
            };

            const allowListView = getAttr('data-allow-list-view');
            const allowCalendarView = getAttr('data-allow-calendar-view');
            const defaultListViewMobile = getAttr('data-default-list-view-mobile');

            let calendar = null;
            let currentDate = new Date();
            let updateTimeout = null;
            let currentView = (!allowCalendarView && allowListView) ? 'listMonth' : 'dayGridMonth';
            let loadedEvents = [];
            const isMobile = () => window.innerWidth <= 768;
            const isPortrait = () => window.matchMedia('(orientation: portrait)').matches;

            function closeEventModal() {
                const modal = document.querySelector('.event-modal');
                if (modal) {
                    modal.classList.add('closing');

                    setTimeout(() => {
                        modal.classList.remove('show', 'closing');
                        document.body.classList.remove('modal-open');
                    }, 300);
                }
            }

            function openEventModal(event, props) {
                const modal = document.querySelector('.event-modal');
                const modalTitle = document.querySelector('.event-modal-title');
                const modalBody = document.querySelector('.event-modal-body');

                if (!modal || !modalTitle || !modalBody) return;

                document.body.classList.add('modal-open');

                requestAnimationFrame(() => {
                    modal.setAttribute('role', 'dialog');
                    modal.setAttribute('aria-modal', 'true');
                    modal.setAttribute('aria-hidden', 'false');
                    modalTitle.id = 'modal-title';
                    modal.setAttribute('aria-labelledby', 'modal-title');

                    modalTitle.textContent = props.summary || event.title;

                    let leftHTML = '';
                    let rightHTML = '';

                    if (props.startDate) {
                        const startDate = props.startDate;
                        const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                        const formattedStart = startDate.toLocaleDateString('fr-FR', options);
                        leftHTML += `
                <div class="event-info-row">
                  <div class="event-info-icon">📅</div>
                  <div class="event-info-content">
                    <div class="event-info-label">Date de début</div>
                    <div class="event-info-text">${formattedStart}</div>
                  </div>
                </div>`;
                    }

                    if (props.endDate && props.endDate.toDateString() !== props.startDate.toDateString()) {
                        const endDate = props.endDate;
                        const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                        const formattedEnd = endDate.toLocaleDateString('fr-FR', options);
                        leftHTML += `
                <div class="event-info-row">
                  <div class="event-info-icon">🏁</div>
                  <div class="event-info-content">
                    <div class="event-info-label">Date de fin</div>
                    <div class="event-info-text">${formattedEnd}</div>
                  </div>
                </div>`;
                    }

                    if (props.location) {
                        const googleMapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(props.location)}`;
                        const wazeUrl = `https://waze.com/ul?q=${encodeURIComponent(props.location)}`;
                        const appleMapsUrl = `https://maps.apple.com/?q=${encodeURIComponent(props.location)}`;
                        leftHTML += `
                <div class="event-info-row">
                  <div class="event-info-icon">📍</div>
                  <div class="event-info-content">
                    <div class="event-info-label">Lieu</div>
                    <div class="event-info-text">${props.location}</div>
                    <div class="event-location-buttons">
                      <a href="${googleMapsUrl}" target="_blank" class="location-btn location-google">Google Maps</a>
                      <a href="${wazeUrl}" target="_blank" class="location-btn location-waze">Waze</a>
                      <a href="${appleMapsUrl}" target="_blank" class="location-btn location-apple">Apple Maps</a>
                    </div>
                  </div>
                </div>`;
                    }

                    if (props.description) {
                        rightHTML += `
                <div class="event-info-row">
                  <div class="event-info-icon">📝</div>
                  <div class="event-info-content">
                    <div class="event-info-label">Description</div>
                    <div class="event-info-text">${props.description}</div>
                  </div>
                </div>`;
                    }

                    if (props.url && props.url.trim()) {
                        rightHTML += `
                <div class="event-info-row">
                  <div class="event-info-icon">🔗</div>
                  <div class="event-info-content">
                    <div class="event-info-label">En savoir plus</div>
                    <a href="${props.url}" target="_blank" class="event-url-button">Visiter le site</a>
                  </div>
                </div>`;
                    }

                    modalBody.innerHTML = `
                <div class="event-modal-body-grid">
                  <div class="event-modal-left">${leftHTML}</div>
                  <div class="event-modal-right">${rightHTML}</div>
                </div>`;
                    modal.classList.add('show');

                    setTimeout(() => {
                        const closeBtn = document.querySelector('.event-modal-close');
                        if (closeBtn) closeBtn.focus();
                    }, 100);
                });
            }

            function updateMonthLabel(date) {
                const monthEl = document.querySelector('.calendar-month');
                if (monthEl && date) {
                    monthEl.textContent = monthNames[date.getMonth()] + ' ' + date.getFullYear();
                }
            }

            function consolidateMultiDayEvents(events) {
                const map = {};
                events.forEach(ev => {
                    const key = ev.id || (ev.title + '_' + (ev.start ? ev.start.toISOString() : Math.random()));
                    if (!map[key]) map[key] = { ...ev };
                    else {
                        if (ev.end > map[key].end) map[key].end = ev.end;
                    }
                });

                const now = new Date();
                return Object.values(map).map(ev => {
                    const startDate = ev.start || (ev.extendedProps && ev.extendedProps.startDate) || null;
                    const endDate = ev.end || (ev.extendedProps && ev.extendedProps.endDate) || null;
                    const isPast = endDate && endDate < now;
                    const isNow = startDate && endDate && startDate <= now && endDate >= now;
                    const isFuture = startDate && startDate > now;
                    const classes = [];
                    const foxEmojiRegex = /\u{1F98A}/u;
                    const hasFox = typeof ev.title === 'string' && foxEmojiRegex.test(ev.title);
                    if (isPast) classes.push('fc-event-past');
                    else if (isNow) classes.push('fc-event-now');
                    else if (isFuture) {
                        classes.push('fc-event-future');
                        if (hasFox) classes.push('fc-event-fox');
                    }
                    return {
                        ...ev,
                        classNames: classes
                    };
                });
            }

            function pruneOuterMonthRows() {
                if (!calendar || currentView !== 'dayGridMonth') return;
                const calendarEl = document.querySelector('.fullcalendar-container');
                if (!calendarEl) return;
                const view = calendar.view;
                if (!view || !view.currentStart) return;
                const targetMonth = view.currentStart.getMonth();
                const body = calendarEl.querySelector('.fc-daygrid-body');
                if (!body) return;
                const rows = body.querySelectorAll('tr');
                rows.forEach(row => {
                    const cells = row.querySelectorAll('.fc-daygrid-day');
                    let hasCurrent = false;
                    cells.forEach(cell => {
                        const dateStr = cell.getAttribute('data-date');
                        if (dateStr) {
                            const cellDate = new Date(dateStr);
                            if (cellDate.getMonth() === targetMonth) hasCurrent = true;
                        }
                    });
                    if (!hasCurrent) {
                        row.style.display = 'none';
                    } else {
                        row.style.display = '';
                    }
                });
                setTimeout(() => { if (calendar) calendar.updateSize(); }, 30);
            }

            function initCalendar(viewName) {
                const calendarEl = document.querySelector('.fullcalendar-container');
                const wrapper = document.getElementById('calendar-wrapper');

                if (calendar !== null) calendar.destroy();
                resizeWrapperHeight();

                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: viewName,
                    initialDate: currentDate,
                    locale: 'fr',
                    firstDay: 1,
                    headerToolbar: false,
                    showNonCurrentDates: false,
                    height: '100%',
                    contentHeight: 'auto',
                    expandRows: true,
                    dayMaxEvents: false,
                    dayMaxEventRows: false,
                    eventMaxStack: 99,
                    eventDisplay: 'block',
                    allDaySlot: true,
                    slotMinTime: '06:00:00',
                    slotMaxTime: '23:00:00',
                    slotLabelInterval: '01:00:00',
                    events: consolidateMultiDayEvents(loadedEvents),
                    eventClick: function (info) {
                        info.jsEvent.preventDefault();
                        openEventModal(info.event, info.event.extendedProps);
                    },
                    eventContent: function (arg) {
                        const event = arg.event;
                        const title = document.createElement('div');
                        title.className = 'fc-event-title';
                        title.textContent = event.title;
                        const container = document.createElement('div');
                        container.className = 'fc-event-content';
                        container.appendChild(title);
                        return { domNodes: [container] };
                    },
                    eventDidMount: function (info) {
                        try {
                            const event = info.event;
                            const extProps = event.extendedProps;
                            if (extProps.classNames) {
                                extProps.classNames.forEach(className => {
                                    info.el.classList.add(className);
                                });
                            }
                            info.el.style.cursor = 'pointer';
                        } catch (e) { }
                    },
                    datesSet: function (info) {
                        currentDate = info.start;
                        updateMonthLabel(currentDate);
                        if (isMobile() && defaultListViewMobile && currentView === 'dayGridMonth') {
                            pruneOuterMonthRows();
                        }
                    }
                });

                calendar.render();
                currentView = viewName;
                updateMonthLabel(currentDate);

                setTimeout(() => {
                    resizeWrapperHeight();
                    if (calendar) calendar.updateSize();
                    pruneOuterMonthRows();
                }, 100);
            }

            function toggleView() {
                const btnToggleView = document.getElementById('btn-toggle-view');
                const calendarZone = document.querySelector('.calendar-zone');

                if (currentView === 'dayGridMonth') {
                    initCalendar('listMonth');
                    if (btnToggleView) btnToggleView.textContent = 'Vue Calendrier';
                    if (calendarZone) calendarZone.classList.add('list-view-active');
                } else {
                    initCalendar('dayGridMonth');
                    if (btnToggleView) btnToggleView.textContent = 'Vue Liste';
                    if (calendarZone) calendarZone.classList.remove('list-view-active');
                }
            }

            function resizeWrapperHeight() {
                const wrapper = document.getElementById('calendar-wrapper');
                if (!wrapper) return;

                const top = wrapper.getBoundingClientRect().top;
                const bottomMargin = 16;
                const available = window.innerHeight - top - bottomMargin;

                if (available > 200) {
                    wrapper.style.height = available + 'px';
                    wrapper.style.maxHeight = available + 'px';
                }
            }

            function handleOrientationChange() {
                if (isMobile()) {
                    if (defaultListViewMobile && currentView !== 'listMonth') {
                        toggleView();
                    }
                }
                resizeWrapperHeight();
                if (calendar) {
                    setTimeout(() => {
                        calendar.updateSize();
                        pruneOuterMonthRows();
                    }, 100);
                }
            }

            let scrollBlocked = false;

            function toggleScrollLock(state) {
                const body = document.body;

                if (state && !scrollBlocked) {
                    scrollBlocked = true;
                    body.classList.add('scroll-locked');
                    document.documentElement.classList.add('scroll-locked');
                } else if (!state && scrollBlocked) {
                    scrollBlocked = false;
                    body.classList.remove('scroll-locked');
                    document.documentElement.classList.remove('scroll-locked');
                }
            }

            (function () {
                const calendarEl = document.querySelector('.fullcalendar-container');
                const prevBtn = document.querySelector('.calendar-prev');
                const nextBtn = document.querySelector('.calendar-next');
                const todayBtn = document.querySelector('.calendar-today');
                const modalOverlay = document.querySelector('.event-modal-overlay');
                const modalClose = document.querySelector('.event-modal-close');
                const btnToggleView = document.getElementById('btn-toggle-view');

                if (!calendarEl) return;
                if (typeof FullCalendar === 'undefined' || !FullCalendar.Calendar) {
                    console.error('FullCalendar not loaded');
                    return;
                }

                if (modalClose) modalClose.onclick = closeEventModal;
                if (modalOverlay) modalOverlay.onclick = closeEventModal;

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closeEventModal();
                });

                if (btnToggleView) btnToggleView.onclick = toggleView;

                if (prevBtn) prevBtn.onclick = () => calendar && calendar.prev();
                if (nextBtn) nextBtn.onclick = () => calendar && calendar.next();
                if (todayBtn) todayBtn.onclick = () => calendar && calendar.today();

                const btnSubscribe = document.getElementById('btn-subscribe');
                if (btnSubscribe) {
                    btnSubscribe.onclick = function (e) {
                        e.preventDefault();
                        const icalUrl = container ? container.getAttribute('data-ical-url') : 'https://raw.githubusercontent.com/QuentinMarical/lameutenormande/refs/heads/main/events.ics';
                        window.location.href = 'webcal:' + icalUrl.replace('https:', '').replace('http:', '');
                    };
                }

                window.addEventListener('orientationchange', handleOrientationChange);
                window.addEventListener('resize', handleOrientationChange);
                window.addEventListener('resize', resizeWrapperHeight);
                window.addEventListener('load', resizeWrapperHeight);

                const calendarZone = document.querySelector('.calendar-zone');

                if (calendarZone) {
                    calendarZone.addEventListener('scroll', () => {
                        toggleScrollLock(calendarZone.scrollTop > 0);
                    });
                }

                window.addEventListener('load', () => {
                    if (calendarZone) toggleScrollLock(calendarZone.scrollTop > 0);
                });

                (async function () {
                    try {
                        const icalUrl = container ? container.getAttribute('data-ical-url') : 'https://raw.githubusercontent.com/QuentinMarical/lameutenormande/refs/heads/main/events.ics';
                        
                        const response = await fetch(icalUrl);
                        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                        
                        const icsText = await response.text();
                        
                        const jcalData = ICAL.parse(icsText);
                        const comp = new ICAL.Component(jcalData);
                        const vevent = comp.getAllSubcomponents('vevent');
                        
                        loadedEvents = vevent.map(v => {
                            try {
                                const event = new ICAL.Event(v);
                                const startDate = event.startDate ? event.startDate.toJSDate() : new Date();
                                const endDate = event.endDate ? event.endDate.toJSDate() : new Date();
                                
                                return {
                                    id: event.uid || Math.random().toString(),
                                    title: event.summary || 'Événement',
                                    start: startDate,
                                    end: endDate,
                                    extendedProps: {
                                        summary: event.summary || '',
                                        description: event.description || '',
                                        location: event.location || '',
                                        url: event.url || '',
                                        startDate: startDate,
                                        endDate: endDate
                                    }
                                };
                            } catch (e) {
                                console.warn('Erreur parsing événement:', e);
                                return null;
                            }
                        }).filter(e => e !== null);
                        
                        document.getElementById('calendar-loader').style.display = 'none';
                        document.getElementById('calendar-wrapper').style.display = 'flex';
                        
                        initCalendar(currentView);
                        
                        console.log(`${loadedEvents.length} événements chargés`);
                        
                    } catch (error) {
                        console.error('Erreur chargement calendrier:', error);
                        const loaderMsg = document.getElementById('calendar-loader-message');
                        if (loaderMsg) {
                            loaderMsg.innerHTML = `<span style="color:#ff6b6b;">Erreur: ${error.message}</span>`;
                        }
                    }
                })();
            })();
        })();
    </script>

</section>
